<!DOCTYPE html>
<html>
    <head>
        <title>Company Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="../../static/css/style.css">


    </head>
    <body>
    <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{{ url_for('showCompanyDash', companyId = company.companyId) }}">Placement Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('showCompanyDash', companyId = company.companyId ) }}">Dashboard</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('showCompanyDrives', companyId = company.companyId) }}">Existing Drives</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('createDrive', companyId = company.companyId) }}">Create New Drive</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('showCompanyApplications', companyId = company.companyId) }}">View Applications</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link text-danger" href = "{{ url_for('logout') }}">Logout</a>
                </li>
            </ul>
        </div>
    </nav>
        <div class = "d-flex flex-xl-row p-8">
        <h3 class="p-8">Total Drives: {{ totalDrives }}</h3>
        <h3 class="p-8">Total Applications: {{ totalApplications }}</h3>
        <h3 class="p-8">Total Students Placed: {{ totalPlacements }}</h3>
    </div>
    </body>
</html>
