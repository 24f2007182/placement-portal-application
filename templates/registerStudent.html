<!DOCTYPE html>
<html>
    <head>
        <title>Student Registration</title>
    </head>
    <!DOCTYPE html>
<html>
    <head>
        <title>Company Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="./static/css/style.css">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{{ url_for('index') }}">Placement Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class = "nav-item">
                    <a class = "nav-link" href = "">About Us</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "">Best Practices</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link text-danger" href = "{{ url_for('index') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>
        <h2>Create new Student Profile</h2>
        <form method = "POST" action = "/registerStudent" enctype = "multipart/form-data" >
            <div class = "d-flex flex-column gap-3 m-2">
            <div class = "row">
                <div class = "col-md-4">
                <label for = "name" class = "form-label">Enter Name: </label>
                <input type = "text" class = "form-control" required name = "name" required>
                </div>
                <div class = "col-md-4">
                <label for = "positionOpen" class = "form-label">Contact Number:</label>
                <input type = "text" class = "form-control" required name="contact">
                </div>
            </div>
            <div class = "row">
                <div class = "col-md-4">
                <label for="position" class = "form-label">Enter Department:</label>
                <textarea name="dept" class = "form-control" required></textarea>
                </div>
                <div class = "col-md-4">
                <label for = "skills" class = "form-label">Skills :</label>
                <input type = "text" name = "skills" class = "form-control" required>
                </div>
            </div>
            <div class = "row">
            <div class = "col-md-4">
                <label for = "exp" class = "form-label">Select Experience: </label>
                <select name="exp" class="form-select mb-2" required>
                    <option value="" disabled selected>Select Experience</option>
                    <option value="Fresher">Fresher</option>
                    <option value="0-1 Years">0-1 Years</option>
                    <option value="1-3 Years">1-3 Years</option>
                    <option value="3+ Years">3+ Years</option>
                </select>
                </div>
                 <div class = "col-md-4">
                    <label class  = "form-label" for = "resume">Upload Updated Resume:</label>
                    <input type = "file" class = "form-file" required name = "resume">
                </div>
                </div>
                <div class = "row">
                <div class = "col-md-4">
                <label class = "form-label" for="username">Username :</label>
                <input type = "text" class = "form-control" required name = "username"> 
                </div>
                <div class = "col-md-4">
                    <label class = "form-label" for = "password">Password : </label> 
                    <input type = "password" class = "form-control" required name = "password">
                </div>
                </div>

            <div class="row">
            <div class = "col-md-4">
            <button type="submit" class = "btn btn-success">Submit</button>
            <a href = "/" class = "btn btn-danger">Cancel</a>
            </div>
            </div>
        </form>
    </body>
</html>
