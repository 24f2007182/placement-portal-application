    <!DOCTYPE html>
<html>
    <head>
        <title>Company Dashboard</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{{ url_for('index') }}">Placement Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class = "nav-item">
                    <a class = "nav-link" href = "">About Us</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "">Best Practices</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link text-danger" href = "{{ url_for('index') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>
        <h2>Create new Company Profile</h2>
        <form method = "POST" action = "/registerCompany">
            <div class = "d-flex flex-column gap-3 m-2">
            <div class = "row">
                <div class = "col-md-4">
                <label for = "name" class = "form-label">Enter Company Name: </label>
                <input type = "text" class = "form-control" required name = "name" required>
                </div>
                <div class = "col-md-4">
                <label for = "positionOpen" class = "form-label">Company Email:</label>
                <input type = "email" class = "form-control" required name="email">
                </div>
            </div>
            <div class = "row">
                <div class = "col-md-4">
                <label for = "industry" class = "form-label">Enter Industry:</label>
                <textarea name = "industry" class = "form-control" required></textarea>
                </div>
                <div class = "col-md-4">
                <label for = "description" class = "form-label">Description :</label>
                <textarea name = "description" class = "form-control" required></textarea>
                </div>
            </div>
               <div class = "row">
                <div class = "col-md-4">
                <label class = "form-label" for="username">Username :</label>
                <input type = "text" class = "form-control" required name = "username"> 
                </div>
                <div class = "col-md-4">
                    <label class = "form-label" for = "password">Password : </label> 
                    <input type = "password" class = "form-control" required name = "password">
                </div>
                </div>

            <div class="row">
            <div class = "col-md-4">
            <button type="submit" class = "btn btn-success">Submit</button>
            <a href = "/" class = "btn btn-danger">Cancel</a>
            </div>
            </div>
        </form>
    </body>
</html>
