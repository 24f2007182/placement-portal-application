<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Registration</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/style.css">
</head>

<body>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% set category, message = messages[-1] %}
            <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <a href="{{ url_for('clearFlash') }}">
                    <button type="button" class="btn-close"></button>
                </a>
            </div>
        {% endif %}
    {% endwith %}
</div>

<nav class="navbar navbar-expand-lg px-4" style="background-color: var(--primary-teal);">
    <div class="container-fluid">

        <a class="navbar-brand text-white" href="{{ url_for('index') }}">Placement Portal</a>

        <button class="navbar-toggler border-0 text-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('registerStudent')}}">Student Registration</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('registerCompany')}}">Company Registration</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{{ url_for('login') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<div class="content container mt-4">
    <h2>Create New Company Profile</h2>

    <form method="POST" action="/registerCompany">
        <div class="d-flex flex-column gap-3 m-2">

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Enter Company Name:</label>
                    <input type="text" class="form-control" name="name" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Company Email:</label>
                    <input type="email" class="form-control" name="email" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Enter Industry:</label>
                    <textarea class="form-control" name="industry" required></textarea>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Description:</label>
                    <textarea class="form-control" name="description" required></textarea>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">Username:</label>
                    <input type="text" class="form-control" name="username" required>
                </div>

                <div class="col-md-4">
                    <label class="form-label">Password:</label>
                    <input type="password" class="form-control" name="password" required>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4">
                    <button type="submit" class="btn btn-success">Submit</button>
                    <a href="/" class="btn btn-danger">Cancel</a>
                </div>
            </div>

        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
