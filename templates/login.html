<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placement Portal Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./static/css/style.css">
</head>

<body>

<div class="info-card">
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% set category, message = messages[-1] %}
            <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <a href="{{ url_for('clearFlash') }}">
                    <button type="button" class="btn-close"></button>
                </a>
            </div>
        {% endif %}
    {% endwith %}
</div>

<nav class="navbar navbar-expand-lg px-4" style="background-color: var(--primary-teal);">
    <div class="container-fluid">

        <a class="navbar-brand text-white" href="{{ url_for('index') }}">Placement Portal</a>

        <button class="navbar-toggler border-0 text-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#mainNavbar">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('registerStudent')}}">Student Registration</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('registerCompany')}}">Company Registration</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{{ url_for('login') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>

    </div>
</nav>

<div class="d-flex flex-column position-absolute top-50 start-50 translate-middle loginForm">
    <form method="POST" action="/login">
        <h3 class="text-center mb-4">Login</h3>
        
        <div class="row g-2 mt-2">
            <div class="col-6">
                <label class="form-label">Username :</label>
                <input type="text" class="form-control" required name="username"> 
            </div>
            <div class="col-6">
                <label class="form-label">Password :</label> 
                <input type="password" class="form-control" required name="password">
            </div>
        </div>

        <div class="row g-2 mt-3">
            <div class="col-6">
                <button type="submit" class="btn btn-success w-100">Submit</button>
            </div>
            <div class="col-6">
                <a href="/" class="btn btn-danger w-100">Cancel</a>
            </div>
        </div>
    </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

<style>
.loginForm {
    background-color: rgba(115, 233, 241, 0.85);
    padding: 2rem;
    border-radius: 15px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    width: 100%;
    max-width: 400px;
}
</style>

</html>
