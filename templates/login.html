<!DOCTYPE html>
<html>
    <head>
        <title>Placement Portal Home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="./static/css/style.css">
    
    </head>
    <body>
        <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{{ url_for('index') }}">Placement Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('registerStudent')}}">Student Registration</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('registerCompany')}}">Company Registration</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link text-danger" href = "{{ url_for('login') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>
    <div class = "d-flex flex-column position-absolute top-50 start-50 translate-middle loginForm">
        <form method = "POST" action = "/login">
            <h3 class="text-center mb-4">Login</h3>
            
            <div class = "row g-2 mt-2">
                <div class="col-6">
                <label class = "form-label" for="username">Username :</label>
                <input type = "text" class = "form-control" required name = "username"> 
                </div>
                <div class = "col-6">
                    <label class = "form-label" for = "password">Password : </label> 
                    <input type = "password" class = "form-control" required name = "password">
                </div>
            </div>
            <div class ="row g-2 mt-2">
                <div class="col-6">
                    <button type="submit" class = "btn btn-success">Submit</button>
                </div>
                <div class = "col-6">
                    <a href = "/" class = "btn btn-danger">Cancel</a>
                </div>
            </div>
        </form>
    </div>
    </body>
</html>
<style>
    .loginForm {
        background-color: rgba(217, 188, 244, 0.85);
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
    }
</style>
