<!DOCTYPE html>
<html>
    <head>
        <title>Placement Portal Home</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">

    </head>
    <body>
        <nav class="navbar navbar-expand-lg px-4">
        <a class="navbar-brand" href="{{ url_for('index') }}">Placement Portal</a>

        <div class="collapse navbar-collapse">
            <ul class="navbar-nav ms-auto">
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('registerStudent')}}">Student Registration</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link" href = "{{ url_for('registerCompany')}}">Company Registration</a>
                </li>
                <li class = "nav-item">
                    <a class = "nav-link text-danger" href = "{{ url_for('login') }}">Login/Sign Up</a>
                </li>
            </ul>
        </div>
    </nav>
        <form method = "POST" action = "/login">
            <div class = "d-flex flex-col">
            <div class = "row">
                <div class = "col-md-4">
                <label class = "form-label" for="username">Username :</label>
                <input type = "text" class = "form-control" required name = "username"> 
                </div>
                <div class = "col-md-4">
                    <label class = "form-label" for = "password">Password : </label> 
                    <input type = "password" class = "form-control" required name = "password">
                </div>
                </div>

                <div class="row">
            <div class = "col-md-4">
            <button type="submit" class = "btn btn-success">Submit</button>
            <a href = "/" class = "btn btn-danger">Cancel</a>
            </div>
            </div>
        </form>
    </body>
</html>
