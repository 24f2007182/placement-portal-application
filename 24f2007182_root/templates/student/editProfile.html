<!DOCTYPE html>
<html>
    <head>
        <title>
            Edit Profile
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
        <link rel="stylesheet" href="../../static/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
        
    </head>
    <body>
        <div class="flash-container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% set category, message = messages[-1]  %}
                <div class="alert alert-{{ category if category != 'message' else 'info' }} alert-dismissible fade show" role="alert">
                {{ message }}
                <a href="{{ url_for('clearFlash') }}"><button type="button" class="btn-close" ></button></a>
                </div>
            {% endif %}
        {% endwith %}
        </div>
            <nav class="navbar navbar-expand-lg px-4" style="background-color: var(--primary-teal);">
    <div class="container-fluid">

        <a class="navbar-brand text-white" href="{{ url_for('showStudentDashboard', studentId=student.studentId) }}">
            Placement Portal
        </a>

        <button class="navbar-toggler border-0 text-white" type="button"
                data-bs-toggle="collapse" data-bs-target="#studentNavbar">
            ☰
        </button>

        <div class="collapse navbar-collapse" id="studentNavbar">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('showStudentDashboard', studentId=student.studentId) }}">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('viewJobs', studentId=student.studentId) }}">View Jobs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('viewHistory', studentId=student.studentId) }}">Application History</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="{{ url_for('editProfile', studentId=student.studentId) }}">Edit Profile</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-danger" href="{{ url_for('logout') }}">Logout</a>
                </li>
            </ul>
        </div>

    </div>
</nav>
        <div class = "content">
        <h2>Update Student Profile</h2>
        <form method = "POST" action = "/student/{{ student.studentId }}/editProfile" enctype="multipart/form-data">
            <div class = "d-flex flex-column gap-3 m-2">
            <div class = "row">
                <div class = "col-md-4">
                <label for = "name" class = "form-label">Enter Name: </label>
                <input type = "text" class = "form-control" required value = "{{ student.name }}"name = "name" required>
                </div>
                <div class = "col-md-4">
                <label for = "positionOpen" class = "form-label">Contact Number:</label>
                <input type = "text"  value = "{{ student.contactNumber }}" class = "form-control" required name="contact">
                </div>
            </div>
            <div class = "row">
                <div class = "col-md-4">
                <label for="position" class = "form-label">Enter Department:</label>
                <input type="text" name="dept" class = "form-control"  value = "{{ student.department }}" required>
                </div>
                <div class = "col-md-4">
                <label for = "skills" class = "form-label">Skills :</label>
                <input type = "text" name = "skills"  value = "{{ student.skills }}" class = "form-control" required>
                </div>
            </div>
            <div class = "row">
            <div class = "col-md-4">
                <label for = "exp" class = "form-label">Select Experience: </label>
                <select name = "exp" class="form-select mb-2" required>
                    <option value = "{{ student.experience }}">{{ student.experience }}"</option>
                    <option value = "Fresher">Fresher</option>
                    <option value = "0-1 Years">0-1 Years</option>
                    <option value = "1-3 Years">1-3 Years</option>
                    <option value = "3+ Years">3+ Years</option>
                </select>
                </div>
                 <div class = "col-md-4">
                    <label class  = "form-label" for = "resume">Upload Updated Resume:</label>
                    <input type = "file" class = "form-file" name = "resume">
                </div>
                </div>
                <div class = "row">
                <div class = "col-md-4">
                    <label class = "form-label" for="username">Username :</label>
                    <input type = "text" class = "form-control"  value = "{{ student.user.username }}" name = "username"> 
                </div>
                <div class = "col-md-4">
                    <label class = "form-label" for = "password">Change Password : </label> 
                    <input type = "password" class = "form-control" name = "password">
                </div>
                </div>

            <div class="row">
            <div class = "col-md-4">
            <button type="submit" class = "btn btn-success">Submit</button>
            <a href = "{{ url_for('showStudentDashboard', studentId = student.studentId)}}" class = "btn btn-danger">Cancel</a>
            </div>
            </div>
        </form>
        </div>
    </body>

</html>
